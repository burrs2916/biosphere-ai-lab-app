name: CI / Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check

  rust-check:
    name: Rust Check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: no-tray-v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - run: cargo check
      - run: cargo clippy -- -W warnings

  build:
    name: Build ${{ matrix.platform }}
    needs: [frontend-check, rust-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            runner: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: Linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: no-tray-v5

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: List build output (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Target directory ==="
          ls src-tauri/target/ 2>/dev/null || echo "No target dir"
          echo "=== Bundle directories ==="
          find src-tauri/target -type d -name "bundle" 2>/dev/null || echo "No bundle dirs"
          echo "=== Installer files ==="
          find src-tauri/target -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app.tar.gz*" \) 2>/dev/null || echo "No installer files"

      - name: List build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Target directory ==="
          if (Test-Path src-tauri/target) { Get-ChildItem src-tauri/target } else { echo "No target dir" }
          echo "=== Installer files ==="
          Get-ChildItem -Path src-tauri/target -Recurse -Include *.dmg,*.msi,*.exe,*.deb,*.AppImage -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BiosphereAI-Lab-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/aarch64-apple-darwin/release/bundle/
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | head -50

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz*
            artifacts/**/*.deb
            artifacts/**/*.AppImage*
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip*
