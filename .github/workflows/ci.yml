name: CI / Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup PyTorch via venv (required by torch-sys)
        run: |
          python3 -m venv /tmp/torch-env
          source /tmp/torch-env/bin/activate
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          echo "VIRTUAL_ENV=/tmp/torch-env" >> $GITHUB_ENV
          echo "/tmp/torch-env/bin" >> $GITHUB_PATH

      - run: cargo check
      - run: cargo clippy -- -W warnings

  build:
    name: Build ${{ matrix.target }}
    needs: [frontend-check, rust-check]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Setup PyTorch via venv (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          python3 -m venv /tmp/torch-env
          source /tmp/torch-env/bin/activate
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          echo "VIRTUAL_ENV=/tmp/torch-env" >> $GITHUB_ENV
          echo "/tmp/torch-env/bin" >> $GITHUB_PATH

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - uses: actions/upload-artifact@v4
        with:
          name: BiosphereAI-Lab-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/*
            src-tauri/target/release/bundle/*
          if-no-files-found: warn
          retention-days: 7

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | head -50

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz*
            artifacts/**/*.deb
            artifacts/**/*.AppImage*
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip*
